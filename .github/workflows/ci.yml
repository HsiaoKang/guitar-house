# 持续集成：类型检查 + 前端构建验证（不编译 Rust，保持轻量）
# 作者: yuchenxi
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 类型检查
        run: pnpm -r typecheck

      - name: 前端构建
        run: pnpm --filter @guitar-house/desktop build
